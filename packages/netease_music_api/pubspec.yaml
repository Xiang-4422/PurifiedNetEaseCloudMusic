name: netease_music_api
description: Dart client for NetEase Cloud Music APIs used by Purified NetEase Cloud Music.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cookie_jar: any
  dio: ^5.2.1+1
  dio_cookie_manager: ^3.1.0
  encrypt: ^5.0.1
  json_annotation: ^4.9.0
  path_provider: ^2.0.15
  pointycastle: ^3.7.3
  pretty_dio_logger: ^1.3.1
  cryptography: ^2.9.0

dev_dependencies:
  build_runner:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  flutter_lints: ^2.0.0
